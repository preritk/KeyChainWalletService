version: '3.9'
services:
  postgres:
    image: postgres:15
    container_name: walletdb
    environment:
      POSTGRES_DB: walletdb
      POSTGRES_USER: wallet_user
      POSTGRES_PASSWORD: wallet_pass
    ports:
      - "5432:5432"
    volumes:
      - wallet_pgdata:/var/lib/postgresql/data

volumes:
  wallet_pgdata:
